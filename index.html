<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>React Concepts: Interactive Reference Guide</title>
    <meta name="description" content="A beautiful and interactive reference guide for learning React fundamentals, hooks, state, routing, and networking. Built from scratch with live working demos." />
    
    <!-- Favicon link -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚛️</text></svg>" />

    <!-- Google Fonts Preconnect links -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- PRELOAD PERFORMANCE HINT: 
         Tells the browser to start downloading the Outfit Google Font stylesheet immediately
         before it parses the Javascript bundle, improving loading speed and preventing text flashes! -->
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" 
      as="style" 
    />
    
    <!-- Actual CSS Font stylesheet load -->
    <link 
      rel="stylesheet" 
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" 
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
